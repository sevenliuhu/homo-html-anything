<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>HOMO · 双11 大促 Banner</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700;900&family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#1a1a2e;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:20px;font-family:'Noto Sans SC','Inter',sans-serif}
  .banner{width:100%;max-width:1200px;aspect-ratio:2/1;border-radius:24px;overflow:hidden;position:relative;background:linear-gradient(135deg,#d43030 0%,#8b1a1a 40%,#ffd700 80%,#ff6b35 100%);background-size:200% 200%;animation:bgShift 8s ease infinite}
  @keyframes bgShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
  .banner-content{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px}
  .banner-title{font-size:clamp(48px,10vw,120px);font-weight:900;color:#ffd700;text-shadow:0 4px 30px rgba(212,48,48,.4);letter-spacing:-.02em;line-height:1;animation:titleIn 1.2s ease-out}
  @keyframes titleIn{0%{opacity:0;transform:scale(.8) translateY(20px)}100%{opacity:1;transform:scale(1) translateY(0)}}
  .banner-sub{font-size:clamp(20px,3vw,36px);font-weight:700;color:#fff;margin-top:12px;text-shadow:0 2px 10px rgba(0,0,0,.3);animation:subIn 1.5s ease-out .3s both}
  @keyframes subIn{0%{opacity:0;transform:translateY(30px)}100%{opacity:1;transform:translateY(0)}}
  .banner-cta{display:inline-block;margin-top:24px;padding:16px 48px;border-radius:999px;background:#ffd700;color:#8b1a1a;font-weight:900;font-size:clamp(16px,2vw,24px);text-decoration:none;box-shadow:0 8px 30px rgba(255,215,0,.3);animation:bounce 2s ease-in-out infinite,bgIn 1.8s ease-out .5s both;transition:all .3s}
  .banner-cta:hover{transform:scale(1.08);box-shadow:0 12px 40px rgba(255,215,0,.5)}
  @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
  @keyframes bgIn{0%{opacity:0;transform:translateY(20px) scale(.95)}100%{opacity:1;transform:translateY(0) scale(1)}}
  .particle{position:absolute;width:6px;height:6px;background:rgba(255,215,0,.4);border-radius:50%;animation:float linear infinite;pointer-events:none}
  @keyframes float{0%{transform:translateY(0) rotate(0deg);opacity:1}100%{transform:translateY(-200px) rotate(720deg);opacity:0}}
  .deco-ring{position:absolute;border:3px solid rgba(255,215,0,.15);border-radius:50%;animation:spin 20s linear infinite;pointer-events:none}
  @keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
  .brand{position:absolute;bottom:20px;right:24px;color:rgba(255,255,255,.3);font-size:14px;font-weight:600;letter-spacing:.15em}
  .countdown-badge{position:absolute;top:20px;right:24px;background:rgba(0,0,0,.3);backdrop-filter:blur(8px);color:#ffd700;padding:8px 16px;border-radius:999px;font-size:14px;font-weight:700;font-family:'Inter',sans-serif;animation:pulse 2s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.7}}

  /* Mobile variant */
  .banner-mobile{width:100%;max-width:400px;aspect-ratio:15/8;border-radius:16px;overflow:hidden;position:relative;background:linear-gradient(135deg,#2d6cdf,#4a8cff);margin-top:20px}
  .banner-mobile .banner-title{font-size:clamp(28px,8vw,48px)}
  .banner-mobile .banner-sub{font-size:clamp(14px,3vw,18px)}
  .banner-mobile .banner-cta{padding:10px 28px;font-size:14px;margin-top:12px}
</style>
</head>
<body>
<div class="banner">
  <!-- Particle decoration -->
  <div class="particle" style="left:10%;animation-duration:4s;animation-delay:0s;"></div>
  <div class="particle" style="left:30%;animation-duration:5s;animation-delay:.5s;width:4px;height:4px;"></div>
  <div class="particle" style="left:55%;animation-duration:3.5s;animation-delay:1s;width:8px;height:8px;"></div>
  <div class="particle" style="left:75%;animation-duration:6s;animation-delay:.2s;width:5px;height:5px;"></div>
  <div class="particle" style="left:90%;animation-duration:4.5s;animation-delay:.8s;"></div>
  <!-- Decorative ring -->
  <div class="deco-ring" style="width:400px;height:400px;top:-100px;left:-50px"></div>
  <div class="deco-ring" style="width:300px;height:300px;bottom:-50px;right:-80px;animation-duration:15s;border-color:rgba(255,255,255,.08)"></div>

  <div class="banner-content">
    <div class="banner-title">双11 狂欢</div>
    <div class="banner-sub">全场 5 折起 · 限时 48 小时 · 顺丰包邮</div>
    <a class="banner-cta" href="#">🔥 立即抢购</a>
  </div>
  <div class="countdown-badge" id="cdBadge">⏱ 倒计时 47:59:32</div>
  <div class="brand">HOMO · 好物</div>
</div>

<!-- Mobile variant example -->
<div class="banner-mobile">
  <div class="banner-content">
    <div class="banner-title">🎉 新品首发</div>
    <div class="banner-sub">HOMO 智能手表 S3 · 首单立减 ¥100</div>
    <a class="banner-cta" href="#">立即购买</a>
  </div>
  <div class="brand" style="color:rgba(255,255,255,.2);font-size:11px">HOMO</div>
</div>

<div style="color:rgba(255,255,255,.3);font-size:12px;margin-top:24px;text-align:center">
  Variant A: 双11大促 (红金) / Variant B: 新品发布 (科技蓝)<br/>
  纯 CSS 实现 · 单文件 HTML · 可直接嵌入商城首页
</div>

<script>
  (function(){
    const end = new Date(); end.setHours(end.getHours()+47,59,32);
    const el = document.getElementById('cdBadge');
    setInterval(() => {
      const diff = Math.max(0, end - Date.now());
      const h = Math.floor(diff/3600000);
      const m = Math.floor((diff%3600000)/60000);
      const s = Math.floor((diff%60000)/1000);
      el.textContent = `⏱ 倒计时 ${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    }, 1000);
  })();
</script>
</body>
</html>
